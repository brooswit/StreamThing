<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StreamThing — Room</title>
<!-- Injected (not a bundler input) so it loads from the no-cache /styles.css route — see src/index.ts. -->
<script>document.write('<link rel="stylesheet" href="/styles.css">')</script>

<div class="topbar">
  <span class="brand">StreamThing</span>
  <span class="room-id" id="roomId"></span>
  <span class="spacer"></span>
  <span class="presence" id="presence"></span>
  <span class="who" id="who"></span>
  <button id="newRoom">New room</button>
  <button id="logout">Log out</button>
</div>

<div class="searchbar-top">
  <input id="q" placeholder="Search your library, archive, and sources…" />
  <button id="searchBtn" class="primary">Search</button>
</div>

<div class="layout">
  <main>
    <div class="panel player-wrap">
      <video id="player" controls playsinline></video>
      <div class="now-playing" id="nowPlaying">Nothing playing yet — search above to start.</div>
    </div>

    <div class="panel search">
      <div id="downloads" class="downloads" style="display:none">
        <div id="dlDownloading" style="display:none">
          <div class="section-title" style="margin:0 0 4px">Downloading</div>
          <div id="dlDownloadingList"></div>
        </div>
        <div id="dlConverting" style="display:none">
          <div class="section-title" style="margin:10px 0 4px">Converting</div>
          <div id="dlConvertingList"></div>
        </div>
      </div>

      <div id="searchResults">
        <div class="empty">Search above to find media to play, restore, or download.</div>
      </div>
    </div>
  </main>

  <aside class="panel chat">
    <h3>Chat</h3>
    <div class="messages" id="messages"></div>
    <div class="chat-input">
      <input id="chatInput" placeholder="Message…" maxlength="2000" />
      <button id="chatSend" class="primary">Send</button>
    </div>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="./app.ts"></script>
